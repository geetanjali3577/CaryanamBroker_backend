<!DOCTYPE html>
<html>
<head>
    <title>User Chat</title>
</head>
<body>

<h2>User Chat</h2>

<input type="number" id="userId" placeholder="User ID"><br><br>
<input type="number" id="ownerId" placeholder="Owner ID"><br><br>

<textarea id="message" placeholder="Enter Message"></textarea><br><br>

<button onclick="sendMessage()">Send</button>

<pre id="result"></pre>

<script>
    function sendMessage() {

        fetch("http://localhost:8080/api/chat/send", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                userId: document.getElementById("userId").value,
                ownerId: document.getElementById("ownerId").value,
                senderRole: "USER",
                message: document.getElementById("message").value
            })
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById("result").innerText =
                JSON.stringify(data, null, 2);
        });
    }
</script>

</body>
</html>
